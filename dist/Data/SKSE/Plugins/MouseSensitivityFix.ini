[General]
; Master enable for all plugin behavior.
bEnabled=true
; Emergency disable that keeps plugin loaded but bypasses transforms/hooks.
bHotDisable=false
; Tracks repeated startup crashes and auto-disables behavior after threshold.
bEnableCrashGuard=true
; Number of crash-starts within the window before auto-disable.
iCrashDisableThreshold=3
; Crash window in seconds used by crash-guard counting.
iCrashWindowSeconds=600
; Global sensitivity scalar applied before axis multipliers.
fGlobalSensitivity=1.0
; Enables deterministic clamping and strict raw transform behavior.
bStrictRawInputMode=true
; Enable/disable sensitivity transform in first-person camera state.
bEnableFirstPersonHook=true
; Enable/disable third-person sensitivity transform in the main mouse hook.
bEnableThirdPersonHook=true
; Third-person smoothing-removal hook toggle.
bEnableSmoothingRemovalHook=true
; Skip transforms while menus/pause/application UI are active.
bDisableInMenus=true
; Skip transforms when engine look controls are disabled.
bDisableWhenLookControlsDisabled=true
; Allow transforms in first-person camera state.
bAllowInFirstPerson=true
; Allow transforms in third-person camera state.
bAllowInThirdPerson=true
; Allow transforms while iron sights camera state is active.
bAllowInIronSights=true
; Allow transforms while bow zoom is active.
bAllowInBowZoom=true
; Allow transforms during combat.
bAllowInCombat=true
; Apply sensitivity transform to right-stick look input (gamepad).
bAffectGamepadLook=true
; Suppress first large delta after long input gap (alt-tab/focus regain).
bSuppressFocusSpike=true
; Gap threshold (ms) used by focus-spike suppression.
iFocusSpikeGapMs=350
; Per-frame clamp cap used in strict raw mode.
fMaxDeltaPerFrame=1000.0

[Advanced]
; Horizontal axis multiplier (after global sensitivity).
fXAxisMultiplier=1.0
; Vertical axis multiplier (after global sensitivity).
fYAxisMultiplier=1.0
; Enables throttled hook counters + last-delta snapshots in log.
bVerboseLogging=false

[Compatibility]
; Master toggle for preset-driven compatibility behavior.
bUseCompatibilityPresets=true
; Apply Improved Camera preset logic.
bPresetImprovedCamera=true
; Apply SmoothCam preset logic.
bPresetSmoothCam=true
; Delegate third-person behavior when SmoothCam is detected.
bDelegateThirdPersonWhenSmoothCam=true
; Delegate third-person behavior when Improved Camera is detected.
bDelegateThirdPersonWhenImprovedCamera=true
; Force plugin smoothing behavior even when SmoothCam is detected.
bForceOverrideSmoothCam=false
; Force plugin third-person behavior even when Improved Camera is detected.
bForceOverrideImprovedCamera=false
; Detection override for Improved Camera: -1 auto, 0 force-off, 1 force-on.
iOverrideDetectedImprovedCamera=-1
; Detection override for SmoothCam: -1 auto, 0 force-off, 1 force-on.
iOverrideDetectedSmoothCam=-1

