[General]
; Master enable for all plugin behavior.
bEnabled=true
; Emergency disable - keeps plugin loaded but bypasses all transforms.
bHotDisable=false
; Global sensitivity scalar applied before per-device multipliers.
fGlobalSensitivity=1.0
; Apply sensitivity transform in first-person camera state.
bEnableFirstPersonHook=true
; Apply sensitivity transform in third-person camera state.
bEnableThirdPersonHook=true
; Remove third-person camera smoothing/interpolation.
bEnableSmoothingRemovalHook=true
; Disable transforms while game is paused or system menu is open.
bDisableInMenus=false
; Set false if look controls are incorrectly reported as disabled by mods (e.g. camera mods that manage their own input).
bDisableWhenLookControlsDisabled=false
; Apply sensitivity transform to right-stick gamepad look.
bAffectGamepadLook=true
; Suppress large input spike on focus regain (alt-tab).
bSuppressFocusSpike=true

[Advanced]
; Mouse horizontal axis multiplier.
fMouseXAxisMultiplier=1.0
; Mouse vertical axis multiplier.
fMouseYAxisMultiplier=1.0
; Gamepad horizontal axis multiplier.
fGamepadXAxisMultiplier=1.0
; Gamepad vertical axis multiplier - reduce below 1.0 to compensate for vertical FoV asymmetry on ultrawide displays.
fGamepadYAxisMultiplier=0.55
; Per-axis sensitivity multipliers applied during bow/crossbow aim.
; Tune independently to match the feel of normal look on each axis.
; X=horizontal, Y=vertical. 1.0 = no change (passthrough).
fBowAimMouseXMultiplier=1.0
fBowAimMouseYMultiplier=1.0
fBowAimGamepadXMultiplier=1.0
fBowAimGamepadYMultiplier=1.0
; Enables throttled hook counters and delta snapshots in the log for debugging.
bVerboseLogging=false

[Compatibility]
; Enable automatic camera mod detection and preset-based policy.
bUseCompatibilityPresets=true
; Adjust behavior when Improved Camera SE is detected.
bPresetImprovedCamera=true
; Adjust behavior when SmoothCam is detected.
bPresetSmoothCam=true
; Reduce third-person intervention when SmoothCam is active.
bDelegateThirdPersonWhenSmoothCam=true
; Reduce third-person intervention when Improved Camera is active.
bDelegateThirdPersonWhenImprovedCamera=true
; Force full intervention even when SmoothCam is detected.
bForceOverrideSmoothCam=false
; Force full intervention even when Improved Camera is detected.
bForceOverrideImprovedCamera=false
